<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mercatto • WhatsApp</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* ===== BASE ===== */
*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
background:#e5ddd5;
}

/* FUNDO */
body::before{
content:"MERCATTO";
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
font-weight:800;
color:#000;
opacity:0.04;
pointer-events:none;
}

/* HEADER */
.header{
padding:14px 18px;
background:#075e54;
color:#fff;
font-weight:700;
}

/* CHAT */
.messages{
flex:1;
overflow:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

/* DATA */
.date{
text-align:center;
font-size:12px;
background:#ffffffcc;
padding:4px 10px;
border-radius:10px;
margin:10px auto;
}

/* MSG */
.msg{
max-width:75%;
padding:10px;
border-radius:10px;
font-size:14px;
}

.user{background:#fff;align-self:flex-start;}
.assistant{background:#dcf8c6;align-self:flex-end;}

/* MIDIA */
.msg img,.msg video{
max-width:220px;
border-radius:10px;
margin-bottom:6px;
cursor:pointer;
}
.msg audio{width:200px}

/* DOC */
.fileBox{
background:#fff;
padding:8px;
border-radius:8px;
cursor:pointer;
}

/* TIME */
.time{
font-size:10px;
opacity:.6;
text-align:right;
}

/* INPUT */
.inputBox{
display:flex;
gap:10px;
padding:10px;
background:#f0f0f0;
}

textarea{
flex:1;
border:none;
border-radius:20px;
padding:10px;
resize:none;
height:40px;
}

/* BOTÕES */
button{
background:#25d366;
border:none;
border-radius:50%;
width:45px;
height:45px;
color:#fff;
cursor:pointer;
}

/* PREVIEW */
.preview{
position:absolute;
bottom:90px;
left:20px;
background:#fff;
padding:10px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

/* SCROLL BTN */
.scrollBtn{
position:absolute;
right:20px;
bottom:90px;
background:#25d366;
color:#fff;
width:40px;
height:40px;
border-radius:50%;
display:none;
align-items:center;
justify-content:center;
cursor:pointer;
}
.time{
font-size:11px;
opacity:.7;
text-align:right;
display:flex;
justify-content:flex-end;
gap:4px;
align-items:center;
}


  
</style>

</head>

<body>


<div id="msgs" class="messages"></div>

<div id="scrollBtn" class="scrollBtn" onclick="scrollBottom()">↓</div>

<div class="inputBox">
<input type="file" id="fileInput" hidden>
<button onclick="fileInput.click()">📎</button>
<button onclick="abrirTemplates()">📩</button>
<textarea id="msg" placeholder="Mensagem..."></textarea>
<button onclick="enviar()">➤</button>
</div>

<div id="preview" class="preview" style="display:none"></div>


<div id="menuTemplates" style="
position:absolute;
bottom:80px;
left:10px;
background:#fff;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;
flex-direction:column;
padding:10px;
gap:5px;
">

<button onclick="enviarTemplate('confirmao_de_reserva')">Reserva</button>
<button onclick="enviarTemplate('reserva_especial')">Sala VIP</button>
<button onclick="enviarTemplate('hello_world')">Teste</button>

</div>





  
<script>

/* ===== SUPABASE ===== */
const db = supabase.createClient(
"https://dxkszikemntfusfyrzos.supabase.co",
"sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
)

/* ===== VARS ===== */
let telefone = new URLSearchParams(location.search).get("telefone")
let mensagensIds = new Set()
let oldestDate = null
let loading = false
let canal = null
let arquivo = null
let ultimaDataRender = null

/* ===== TIME ===== */
function hora(d){

let data

if(d.includes("Z")){
  // veio do Supabase (UTC)
  data = new Date(d)
}else{
  // veio do seu envio local
  data = new Date(d.replace(" ", "T"))
}

return new Intl.DateTimeFormat("pt-BR",{
  hour:"2-digit",
  minute:"2-digit",
  timeZone:"America/Bahia"
}).format(data)

}
  
function dataLabel(d){

let data

// 🔥 trata os dois formatos (Supabase + local)
if(d.includes("Z")){
  data = new Date(d) // UTC
}else{
  data = new Date(d.replace(" ", "T")) // banco local
}

// formatter padrão (comparação)
const formatter = new Intl.DateTimeFormat("en-CA",{
  timeZone:"America/Bahia",
  year:"numeric",
  month:"2-digit",
  day:"2-digit"
})

const hoje = formatter.format(new Date())
const dataMsg = formatter.format(data)

// HOJE
if(dataMsg === hoje) return "HOJE"

// ONTEM
const ontemDate = new Date()
ontemDate.setDate(ontemDate.getDate()-1)

const ontem = formatter.format(ontemDate)

if(dataMsg === ontem) return "ONTEM"

// PADRÃO (data normal)
return new Intl.DateTimeFormat("pt-BR",{
  timeZone:"America/Bahia"
}).format(data)

}
/* ===== SCROLL ===== */
function scrollBottom(){
msgs.scrollTop = msgs.scrollHeight
scrollBtn.style.display="none"
}

msgs.addEventListener("scroll",()=>{
if(msgs.scrollTop < msgs.scrollHeight - msgs.clientHeight - 200){
scrollBtn.style.display="flex"
}else{
scrollBtn.style.display="none"
}
if(msgs.scrollTop < 50){
carregarMais()
}
})

function gerarHTML(m){

let html = ""

/* TEMPLATE */
if(m.tipo === "template"){

  let nomeTemplate = ""

  try{
    const parsed = JSON.parse(m.mensagem)
    nomeTemplate = parsed.template
  }catch{
    nomeTemplate = m.mensagem
  }

  html += `
  <div style="
    background:#fff3cd;
    padding:8px 10px;
    border-radius:8px;
    font-size:13px;
    border-left:4px solid #f59e0b;
  ">
    📩 Template enviado:<br>
    <strong>${nomeTemplate}</strong>
  </div>
  `
}

/* MIDIA */
if(m?.tipo === "imagem" && m?.media_url){
  html += `<img src="${m.media_url}" onclick="window.open('${m.media_url}')">`
}

else if(m?.tipo === "video" && m?.media_url){
  html += `
  <video controls style="max-width:220px;border-radius:10px;">
    <source src="${m.media_url}">
  </video>`
}

else if(m?.tipo === "audio" && m?.media_url){
  html += `
  <audio controls style="width:200px;">
    <source src="${m.media_url}">
  </audio>`
}

else if(m?.tipo === "documento" && m?.media_url){

  const ext = (m.nome_arquivo || "").split(".").pop()?.toLowerCase()

  if(ext === "pdf"){
    html += `
    <iframe src="${m.media_url}" width="220" height="260"
    style="border:none;border-radius:10px;"></iframe>`
  }else{
    html += `
    <div class="fileBox" onclick="window.open('${m.media_url}')">
      📄 ${m.nome_arquivo || "Abrir arquivo"}
    </div>`
  }
}

/* TEXTO */
if(m?.mensagem){
  html += `<div>${m.mensagem}</div>`
}

/* STATUS */
function statusIcon(status){
  if(status === "sent") return "✓"
  if(status === "delivered") return "✓✓"
  if(status === "read") return "<span style='color:#34b7f1'>✓✓</span>"
  return ""
}

/* TIME */
html += `
<div class="time">
  ${hora(m.created_at)} ${statusIcon(m.status)}
</div>
`

return html

}


function render(m,top=false){

const existente = document.getElementById(m.id)

if(existente){
  existente.innerHTML = gerarHTML(m)
  return
}

mensagensIds.add(m.id)

const label = dataLabel(m.created_at)

if(label !== ultimaDataRender){
  const d = document.createElement("div")
  d.className="date"
  d.innerText = label
  top ? msgs.prepend(d) : msgs.appendChild(d)
  ultimaDataRender = label
}

const div = document.createElement("div")
div.id = m.id || m.message_id
div.className = "msg " + (m.role==="assistant"?"assistant":"user")

div.innerHTML = gerarHTML(m)

top ? msgs.prepend(div) : msgs.appendChild(div)
}



/* ===== LOAD INICIAL ===== */
async function iniciar(){

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.order("created_at",{ascending:false})
.limit(20)

if(!data) return

data.reverse().forEach(m=>render(m))

oldestDate = data[0]?.created_at

scrollBottom()

realtime()

}

/* ===== LOAD MAIS ===== */
async function carregarMais(){

if(loading) return
loading = true

const {data} = await db
.from("conversas_whatsapp")
.select("*")
.eq("telefone",telefone)
.lt("created_at",oldestDate)
.order("created_at",{ascending:false})
.limit(20)

if(!data || data.length===0){
loading=false
return
}

oldestDate = data[0].created_at

data.reverse().forEach(m=>render(m,true))

loading=false

}

/* ===== REALTIME ===== */
function realtime(){

if(canal) db.removeChannel(canal)

canal = db.channel("chat-"+telefone)
.on("postgres_changes",{
event:"*",
schema:"public",
table:"conversas_whatsapp",
filter:`telefone=eq.${telefone}`
},payload=>{

render(payload.new)

if(msgs.scrollTop > msgs.scrollHeight - msgs.clientHeight - 200){
scrollBottom()
}

})
.subscribe()

}

/* ===== PREVIEW ===== */
fileInput.onchange = ()=>{
arquivo = fileInput.files[0]

preview.style.display="block"

if(arquivo.type.includes("image")){
preview.innerHTML=`<img src="${URL.createObjectURL(arquivo)}" width="120">`
}else if(arquivo.type.includes("video")){
preview.innerHTML=`<video src="${URL.createObjectURL(arquivo)}" width="120" controls></video>`
}else{
preview.innerHTML=`📄 ${arquivo.name}`
}
}

/* ===== UPLOAD ===== */
async function uploadMidia(file){

  const nome = Date.now() + "-" + file.name.replace(/\s+/g,"_")

  const { data, error } = await db
    .storage
    .from("buffet_whatsa_mercatto")
    .upload(nome, file)

  if(error){
    console.error("ERRO UPLOAD:", error)
    alert("Erro ao enviar arquivo")
    return null
  }

  const { data: publicUrlData } = db
    .storage
    .from("buffet_whatsa_mercatto")
    .getPublicUrl(nome)

  if(!publicUrlData?.publicUrl){
    alert("Erro ao gerar URL pública")
    return null
  }

  return publicUrlData.publicUrl
}

/* ===== ENVIAR ===== */
async function enviar(){

if(!telefone) return

const texto = msg.value.trim()

const temp = {
id:"temp-"+Date.now(),
mensagem:texto,
created_at:new Date().toLocaleString("sv-SE").replace("T"," "),
  role:"assistant",
status:"sent"
}

render(temp)
scrollBottom()

msg.value=""

/* MIDIA */
let media=null
let tipo="texto"
let nomeArquivo=null

if(arquivo){

  media = await uploadMidia(arquivo)

  if(!media){
    alert("Falha no upload. Cancelando envio.")
    return
  }

  nomeArquivo = arquivo.name

  if(arquivo.type.includes("image")) tipo="imagem"
  else if(arquivo.type.includes("video")) tipo="video"
  else if(arquivo.type.includes("audio")) tipo="audio"
  else tipo="documento"

}

/* API */
const send = await fetch("/api/send",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
telefone,
mensagem:texto,
media_url:media,
tipo,
nome_arquivo:nomeArquivo
})
}).then(r => r.json())

const messageId = send?.message_id



arquivo=null
preview.style.display="none"

}

/* ===== START ===== */
iniciar()


function abrirTemplates(){
  const menu = document.getElementById("menuTemplates")
  menu.style.display = menu.style.display === "flex" ? "none" : "flex"
}

async function enviarTemplate(nome){

  if(!telefone) return

  let parametros = {}

  if(nome === "confirmao_de_reserva"){
    parametros = {
      nome: "Cliente",
      data: "20/03",
      hora: "20:00",
      pessoas: "2"
    }
  }

  if(nome === "reserva_especial"){
    parametros = {
      video: "https://ehxrrpsiksceljmhsfxk.supabase.co/storage/v1/object/public/MERCATTO/WhatsApp%20Video%202026-03-10%20at%2021.08.40.mp4"
    }
  }

  if(nome === "hello_world"){
    parametros = {}
  }

  try{

    const response = await fetch("/api/send-template",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        telefone,
        template: nome,
        parametros
      })
    })

    const data = await response.json()

    if(data?.error){
      alert("Erro: " + JSON.stringify(data.error))
      return
    }

   const messageId = data?.data?.messages?.[0]?.id || data?.messages?.[0]?.id || null

const { error } = await db
  .from("conversas_whatsapp")
  .insert({
    telefone: telefone.replace(/\D/g, ""),
    mensagem: JSON.stringify({
      template: nome,
      parametros
    }),
    tipo: "template",
    role: "assistant",
    message_id: messageId,
    status: "sent",
    created_at: new Date().toISOString()
  })

if(error){
  console.error("❌ ERRO AO SALVAR:", error)
  alert("Erro ao salvar no banco")
  return
}else{
  console.log("💾 SALVO COM SUCESSO")
}

    

  }catch(err){
    console.error("🔥 ERRO:", err)
  }

  document.getElementById("menuTemplates").style.display = "none"
}




  
</script>

</body>
</html>
